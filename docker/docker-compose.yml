version: "3.8"

services:
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: qstash-worker
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - qstash-net

  callback:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: qstash-callback
    command: ["python", "-c", "import uvicorn; uvicorn.run('examples.callback_server:app', host='0.0.0.0', port=8081)"]
    ports:
      - "8081:8081"
    env_file:
      - ../.env
    restart: unless-stopped
    networks:
      - qstash-net

networks:
  qstash-net:
    driver: bridge
